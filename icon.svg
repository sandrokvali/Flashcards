<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <!-- App Icon Background -->
    <rect width="400" height="400" rx="80" fill="#121212" />
    
    <!-- Background Card Offset -->
    <rect x="120" y="90" width="160" height="220" rx="20" fill="none" stroke="#333333" stroke-width="10" transform="rotate(12 200 200)" />
    
    <!-- Foreground Card -->
    <rect x="120" y="90" width="160" height="220" rx="20" fill="#1e1e1e" stroke="#bb86fc" stroke-width="10" />
    
    <!-- The Minimalist 'K' & Checkmark -->
    <!-- Stem -->
    <line x1="160" y1="140" x2="160" y2="260" stroke="#bb86fc" stroke-width="18" stroke-linecap="round" />
    
    <!-- Upper Arm -->
    <line x1="160" y1="200" x2="210" y2="150" stroke="#bb86fc" stroke-width="18" stroke-linecap="round" />
    
    <!-- Lower Arm / Correct Answer Trace (Breaks out of the card) -->
    <path d="M 160 200 L 205 245 L 290 140" fill="none" stroke="#03dac6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
</svg>
